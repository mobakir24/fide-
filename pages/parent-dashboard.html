<!DOCTYPE html>
<html lang="tr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fide — Ebeveyn Paneli</title>
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body class="dashboard-body">

    <nav class="dash-nav">
        <div class="logo">🌱 fide <span style="font-size: 14px; color: var(--accent-color);">Ebeveyn</span></div>
        <div class="user-stats">
            <div class="user-welcome">Hoş geldiniz, <span id="parentName">Ebeveyn</span>! 👨‍👩‍👧</div>
        </div>
    </nav>

    <main class="dash-container">
        
        <section class="progress-section">
            <h2>Family Progress Overview</h2>
            <div class="stat-mini-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 15px;">
                <div class="stat-mini-card" style="background: white; padding: 20px; border-radius: 16px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.02);">
                    <div style="font-size: 12px; color: #9698c4; font-weight: bold; text-transform: uppercase;">Total Linked Children</div>
                    <div style="font-size: 28px; font-weight: bold; color: var(--primary-color); margin-top: 5px;">1</div>
                </div>
                <div class="stat-mini-card" style="background: white; padding: 20px; border-radius: 16px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.02);">
                    <div style="font-size: 12px; color: #9698c4; font-weight: bold; text-transform: uppercase;">Total XP Earned</div>
                    <div style="font-size: 28px; font-weight: bold; color: var(--accent-color); margin-top: 5px;"><span id="totalFamilyXP">0</span> XP</div>
                </div>
                <div class="stat-mini-card" style="background: white; padding: 20px; border-radius: 16px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.02);">
                    <div style="font-size: 12px; color: #9698c4; font-weight: bold; text-transform: uppercase;">Learning Reports</div>
                    <button class="btn-action" style="padding: 6px 12px; font-size: 12px; margin-top: 8px;" onclick="generateReport()">Generate PDF</button>
                </div>
            </div>
        </section>

        <section class="lessons-section" style="margin-top: 40px;">
            <h3 class="section-subtitle">Children Accounts & Progress</h3>
            <div class="parent-child-list" style="background: white; padding: 30px; border-radius: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.02);">
                
                <div class="child-row-item" style="display: flex; align-items: center; justify-content: space-between; padding-bottom: 20px; border-bottom: 1px solid #eee;">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <div style="font-size: 40px; background: #f1f3ff; padding: 10px; border-radius: 50%;">🦊</div>
                        <div>
                            <h4 style="font-size: 18px;" id="displayChildName">No Child Connected</h4>
                            <p style="font-size: 13px; color: #9698c4; margin-top: 2px;">Level 1 Trader • Active Student</p>
                        </div>
                    </div>
                    
                    <div style="width: 40%; text-align: right;">
                        <div style="display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; margin-bottom: 5px;">
                            <span>Course Progress</span>
                            <span id="displayChildProgress">0%</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" id="parentChildProgressFill" style="width: 0%;"></div>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script src="../js/dashboard.js"></script>
</body>
</html>
